<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#FAF9F6;
    --bg-elevated:#FFFFFF;
    --ink:#1C1B19;
    --ink-muted:#6F6B63;
    --rule:#E2DFD6;
    --accent:#2F5D50;
    --accent-soft:#E8EFEC;
    --danger:#A65B4E;
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
    --serif:'Noto Serif KR',serif;
    --sans:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.5;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    padding:32px 20px 64px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:24px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--ink-muted);
    text-transform:uppercase;
  }
  h1{
    font-family:var(--sans);
    font-size:26px;
    font-weight:700;
    margin:2px 0 0;
  }
  .total-badge{
    text-align:right;
  }
  .total-badge .label{
    font-size:11px;
    color:var(--ink-muted);
  }
  .total-badge .value{
    font-family:var(--mono);
    font-size:22px;
    font-weight:600;
    color:var(--accent);
  }
  section{
    background:var(--bg-elevated);
    border:1px solid var(--rule);
    border-radius:4px;
    padding:18px 20px;
    margin-bottom:18px;
    position:relative;
  }
  section::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:3px;
    background:var(--accent);
    border-radius:4px 0 0 4px;
  }
  section{padding-left:22px;}
  h2{
    font-family:var(--sans);
    font-size:15px;
    font-weight:700;
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  h2 .num{
    font-family:var(--mono);
    color:var(--accent);
    font-size:13px;
  }
  .grid{
    display:grid;
    grid-template-columns:90px 120px 1.4fr 1fr 1fr 1fr 0.9fr auto;
    gap:8px;
    align-items:end;
  }
  .field label{
    display:block;
    font-size:11px;
    color:var(--ink-muted);
    margin-bottom:4px;
  }
  input, select{
    width:100%;
    padding:8px 9px;
    border:1px solid var(--rule);
    border-radius:3px;
    font-family:var(--sans);
    font-size:13px;
    background:#fff;
    color:var(--ink);
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--accent);
  }
  .amount-input{font-family:var(--mono); text-align:right;}
  button{
    font-family:var(--sans);
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    border-radius:3px;
    border:1px solid transparent;
  }
  .btn-primary{
    background:var(--accent);
    color:#fff;
    padding:8px 16px;
    border:1px solid var(--accent);
  }
  .btn-primary:hover{opacity:0.9;}
  .btn-ghost{
    background:transparent;
    color:var(--ink-muted);
    border:1px solid var(--rule);
    padding:7px 12px;
  }
  .btn-ghost:hover{border-color:var(--ink-muted); color:var(--ink);}
  .filter-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr 1fr 1.4fr auto;
    gap:8px;
    align-items:end;
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  thead th{
    text-align:left;
    font-size:11px;
    color:var(--ink-muted);
    font-weight:600;
    border-bottom:1px solid var(--ink);
    padding:6px 8px;
  }
  thead th.num{text-align:right;}
  tbody td{
    padding:8px;
    border-bottom:1px solid var(--rule);
    vertical-align:middle;
  }
  tbody tr:hover{background:var(--accent-soft);}
  td.amount{
    font-family:var(--mono);
    text-align:right;
    font-weight:600;
  }
  .cat-pill{
    display:inline-block;
    padding:2px 8px;
    border-radius:10px;
    font-size:11px;
    color:#fff;
    font-weight:600;
  }
  .row-actions{display:flex; gap:6px; white-space:nowrap;}
  .row-actions button{padding:4px 8px; font-size:11px;}
  .empty{
    text-align:center;
    color:var(--ink-muted);
    padding:32px 0;
    font-size:13px;
  }
  .stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .chart-box{
    height:260px;
    position:relative;
  }
  .chart-title{
    font-size:12px;
    color:var(--ink-muted);
    margin-bottom:8px;
  }
  .summary-strip{
    display:flex;
    gap:24px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .summary-item .label{font-size:11px; color:var(--ink-muted);}
  .summary-item .value{font-family:var(--mono); font-size:18px; font-weight:600;}
  .type-pill{
    display:inline-block;
    padding:2px 8px;
    border-radius:10px;
    font-size:11px;
    font-weight:600;
  }
  .type-pill.expense{background:#F1EEE8; color:var(--ink-muted);}
  .type-pill.income{background:#E6F2EC; color:var(--accent);}
  td.amount.income{color:var(--accent);}
  td.amount.expense{color:var(--ink);}
  .summary-item .value.income{color:var(--accent);}
  .summary-item .value.expense{color:var(--danger);}
  .tab-nav{
    display:flex;
    gap:4px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    border-bottom:2px solid var(--ink);
    margin-bottom:18px;
    padding-bottom:0;
  }
  .tab-btn{
    flex:0 0 auto;
    background:transparent;
    border:none;
    padding:10px 14px;
    font-size:13px;
    font-weight:600;
    color:var(--ink-muted);
    border-bottom:3px solid transparent;
    margin-bottom:-2px;
    white-space:nowrap;
  }
  .tab-btn.active{
    color:var(--accent);
    border-bottom-color:var(--accent);
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  @media (max-width:760px){
    .grid{grid-template-columns:1fr 1fr;}
    .filter-row{grid-template-columns:1fr 1fr;}
    .stats-grid{grid-template-columns:1fr;}
    .tab-btn{padding:10px 12px; font-size:12.5px;}
  }
  @media (max-width:600px){
    .wrap{padding:16px 12px 48px;}
    header{padding-bottom:10px; margin-bottom:16px;}
    h1{font-size:21px;}
    .total-badge .value{font-size:18px;}
    section{padding:14px 14px 14px 18px;}
    .grid, .filter-row{grid-template-columns:1fr;}
    .summary-strip{gap:14px;}
    .chart-box{height:280px;}

    table, thead, tbody, tr, td{display:block;}
    thead{display:none;}
    tbody tr{
      border:1px solid var(--rule);
      border-radius:6px;
      padding:10px 12px;
      margin-bottom:10px;
    }
    tbody td{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border-bottom:1px dashed var(--rule);
      padding:6px 0;
      text-align:right;
    }
    tbody td:last-child{border-bottom:none; padding-top:10px;}
    tbody td::before{
      content:attr(data-label);
      font-size:11px;
      color:var(--ink-muted);
      font-weight:600;
      text-align:left;
      flex-shrink:0;
    }
    td.amount{font-size:15px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Personal Ledger</div>
      <h1>가계부</h1>
    </div>
    <div class="total-badge">
      <div class="label">필터 순액 (수입-지출)</div>
      <div class="value" id="filteredTotal">0원</div>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="input">입력</button>
    <button class="tab-btn" data-tab="filter">필터</button>
    <button class="tab-btn" data-tab="list">내역</button>
    <button class="tab-btn" data-tab="stats">통계</button>
    <button class="tab-btn" data-tab="backup">백업</button>
  </nav>

  <section class="tab-panel active" id="panel-input">
    <h2><span class="num">01</span> 내역 입력</h2>
    <div class="grid">
      <div class="field"><label>구분</label>
        <select id="f-type">
          <option value="expense">지출</option>
          <option value="income">수입</option>
        </select>
      </div>
      <div class="field"><label>날짜</label><input type="date" id="f-date"></div>
      <div class="field"><label>구매내역</label><input type="text" id="f-item" placeholder="예) 스타벅스 아메리카노"></div>
      <div class="field"><label>금액</label><input type="text" inputmode="numeric" class="amount-input" id="f-amount" placeholder="0"></div>
      <div class="field"><label>구매장소</label><input type="text" id="f-place" placeholder="예) 강남점"></div>
      <div class="field"><label>결제방법</label><input type="text" id="f-payment" list="payment-options" placeholder="카드/현금"></div>
      <div class="field"><label>카테고리</label>
        <select id="f-category"></select>
      </div>
      <div class="field"><button class="btn-primary" id="submitBtn" style="width:100%;">추가</button></div>
    </div>
    <datalist id="payment-options">
      <option value="카드">
      <option value="현금">
      <option value="계좌이체">
      <option value="고양페이">
      <option value="카카오페이">
      <option value="네이버페이">
    </datalist>
  </section>

  <section class="tab-panel" id="panel-filter">
    <h2><span class="num">02</span> 필터</h2>
    <div class="filter-row">
      <div class="field"><label>구분</label>
        <select id="ff-type">
          <option value="">전체</option>
          <option value="expense">지출</option>
          <option value="income">수입</option>
        </select>
      </div>
      <div class="field"><label>시작일</label><input type="date" id="ff-start"></div>
      <div class="field"><label>종료일</label><input type="date" id="ff-end"></div>
      <div class="field"><label>카테고리</label>
        <select id="ff-category"><option value="">전체</option></select>
      </div>
      <div class="field"><label>결제방법</label>
        <select id="ff-payment"><option value="">전체</option></select>
      </div>
      <div class="field"><label>검색 (내역/장소)</label><input type="text" id="ff-search" placeholder="검색어"></div>
      <div class="field"><button class="btn-ghost" id="resetFilterBtn" style="width:100%;">초기화</button></div>
    </div>
  </section>

  <section class="tab-panel" id="panel-list">
    <h2><span class="num">03</span> 내역 목록 <span id="rowCount" style="font-family:var(--mono); font-size:11px; color:var(--ink-muted); font-weight:400;"></span></h2>
    <table>
      <thead>
        <tr>
          <th>날짜</th><th>구분</th><th>구매내역</th><th>카테고리</th><th class="num">금액</th><th>구매장소</th><th>결제방법</th><th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none;">입력된 내역이 없습니다.</div>
  </section>

  <section class="tab-panel" id="panel-stats">
    <h2><span class="num">04</span> 통계 <span style="font-family:var(--mono); font-size:11px; color:var(--ink-muted); font-weight:400;">(현재 필터 기준)</span></h2>
    <div class="summary-strip">
      <div class="summary-item"><div class="label">건수</div><div class="value" id="statCount">0건</div></div>
      <div class="summary-item"><div class="label">수입 합계</div><div class="value income" id="statIncome">0원</div></div>
      <div class="summary-item"><div class="label">지출 합계</div><div class="value expense" id="statExpense">0원</div></div>
      <div class="summary-item"><div class="label">순액</div><div class="value" id="statNet">0원</div></div>
    </div>
    <div class="stats-grid">
      <div>
        <div class="chart-title">월별 수입/지출 추이</div>
        <div class="chart-box"><canvas id="monthlyChart"></canvas></div>
      </div>
      <div>
        <div class="chart-title">지출 카테고리별 비중</div>
        <div class="chart-box"><canvas id="categoryChart"></canvas></div>
      </div>
    </div>
  </section>

  <section class="tab-panel" id="panel-backup">
    <h2><span class="num">05</span> 백업 / 내보내기</h2>
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <button class="btn-primary" id="exportJsonBtn">백업 파일 저장 (.json)</button>
      <button class="btn-ghost" id="exportCsvBtn">엑셀용 내보내기 (.csv)</button>
      <button class="btn-ghost" id="importBtn">백업 파일 불러오기</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
      <span style="font-size:11px; color:var(--ink-muted);">브라우저 저장공간(캐시)이 지워지면 데이터가 사라질 수 있으니, 가끔 백업 파일을 저장해두시는 걸 권장합니다.</span>
    </div>
  </section>
</div>

<script>
const EXPENSE_CATEGORIES = ['식비','생필품','교통','쇼핑','주거','의료','문화/여가','통신','구독','경조사','기타'];
const INCOME_CATEGORIES = ['급여','부수입','이자/배당','환급','기타수입'];
const CATEGORY_COLORS = {
  '식비':'#2F5D50','생필품':'#5C7A6E','교통':'#4A6FA5','쇼핑':'#A65B4E','주거':'#8C6E4B',
  '의료':'#6B5B95','문화/여가':'#3D8B7D','통신':'#B98B3E','구독':'#7A5FA0','경조사':'#C77B93','기타':'#7A7A7A',
  '급여':'#2F5D50','부수입':'#3D8B7D','이자/배당':'#5B8C5A','환급':'#4F9D69','기타수입':'#7BA05B'
};
function populateCategorySelect(type){
  const sel = document.getElementById('f-category');
  const list = type==='income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  sel.innerHTML = list.map(c=>`<option value="${c}">${c}</option>`).join('');
}
document.getElementById('f-type').addEventListener('change', (e)=>{
  populateCategorySelect(e.target.value);
});
const KEYWORD_MAP = [
  ['식비',['식당','카페','커피','스타벅스','편의점','음식','배달','식품','빵','분식','국밥','김밥','치킨','피자','버거']],
  ['생필품',['세제','휴지','치약','칫솔','생필품','다이소','수세미','물티슈','마트','이마트','홈플러스']],
  ['교통',['택시','버스','지하철','주유','톨게이트','교통','철도','ktx','주차','카카오t','쏘카']],
  ['쇼핑',['쇼핑','백화점','옷','신발','화장품','쿠팡','마켓','스토어','지마켓','11번가','올리브영']],
  ['주거',['관리비','월세','전기','가스','수도','임대료']],
  ['의료',['병원','약국','의원','치과','한의원']],
  ['문화/여가',['영화','공연','여행','호텔','놀이','게임','골프','헬스','클럽','콘서트','전시']],
  ['통신',['통신','핸드폰','휴대폰','요금제','skt','kt','lgu']],
  ['구독',['넷플릭스','유튜브','유튜브프리미엄','멜론','왓챠','디즈니','티빙','웨이브','스포티파이','구독','애플뮤직','쿠팡와우','네이버플러스']],
  ['경조사',['축의금','조의금','경조사','부조']]
];
function guessCategory(item, place){
  const text = ((item||'')+' '+(place||'')).toLowerCase();
  for(const [cat, keywords] of KEYWORD_MAP){
    if(keywords.some(k=>text.includes(k))) return cat;
  }
  return '기타';
}

let entries = [];
let editingId = null;
let monthlyChartInst = null;
let categoryChartInst = null;

const STORAGE_KEY = 'ledger_entries';

function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){
    entries = [];
  }
}
function saveEntries(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }catch(e){
    alert('저장에 실패했습니다. 브라우저 저장 공간이 가득 찼거나 시크릿 모드일 수 있습니다.');
    console.error('저장 실패', e);
  }
}

function fmt(n){ return Number(n||0).toLocaleString('ko-KR') + '원'; }

function clearForm(){
  document.getElementById('f-type').value = 'expense';
  populateCategorySelect('expense');
  document.getElementById('f-date').value = '';
  document.getElementById('f-item').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-place').value = '';
  document.getElementById('f-payment').value = '';
  document.getElementById('f-category').value = '식비';
  editingId = null;
  document.getElementById('submitBtn').textContent = '추가';
}

document.getElementById('f-item').addEventListener('blur', ()=>{
  if(editingId) return;
  if(document.getElementById('f-type').value !== 'expense') return;
  const item = document.getElementById('f-item').value;
  const place = document.getElementById('f-place').value;
  if(item) document.getElementById('f-category').value = guessCategory(item, place);
});

document.getElementById('submitBtn').addEventListener('click', async ()=>{
  const type = document.getElementById('f-type').value;
  const date = document.getElementById('f-date').value;
  const item = document.getElementById('f-item').value.trim();
  const amountRaw = document.getElementById('f-amount').value.replace(/[^0-9]/g,'');
  const place = document.getElementById('f-place').value.trim();
  const payment = document.getElementById('f-payment').value.trim();
  const category = document.getElementById('f-category').value;

  if(!date || !item || !amountRaw){
    alert('날짜, 구매내역, 금액은 필수입니다.');
    return;
  }
  const amount = parseInt(amountRaw, 10);

  if(editingId){
    const idx = entries.findIndex(e=>e.id===editingId);
    if(idx>-1) entries[idx] = {...entries[idx], type, date, item, amount, place, payment, category};
  }else{
    entries.push({id: Date.now()+'-'+Math.random().toString(36).slice(2,7), type, date, item, amount, place, payment, category});
  }
  await saveEntries();
  clearForm();
  populateFilterOptions();
  render();
  document.querySelector('.tab-btn[data-tab="list"]').click();
});

document.getElementById('resetFilterBtn').addEventListener('click', ()=>{
  document.getElementById('ff-type').value = '';
  document.getElementById('ff-start').value = '';
  document.getElementById('ff-end').value = '';
  document.getElementById('ff-category').value = '';
  document.getElementById('ff-payment').value = '';
  document.getElementById('ff-search').value = '';
  render();
});

['ff-type','ff-start','ff-end','ff-category','ff-payment','ff-search'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

function populateFilterOptions(){
  const catSel = document.getElementById('ff-category');
  const paySel = document.getElementById('ff-payment');
  const curCat = catSel.value, curPay = paySel.value;
  const cats = [...new Set(entries.map(e=>e.category))].sort();
  const pays = [...new Set(entries.map(e=>e.payment).filter(Boolean))].sort();
  catSel.innerHTML = '<option value="">전체</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  paySel.innerHTML = '<option value="">전체</option>' + pays.map(p=>`<option value="${p}">${p}</option>`).join('');
  catSel.value = curCat; paySel.value = curPay;
}

function getFiltered(){
  const type = document.getElementById('ff-type').value;
  const start = document.getElementById('ff-start').value;
  const end = document.getElementById('ff-end').value;
  const cat = document.getElementById('ff-category').value;
  const pay = document.getElementById('ff-payment').value;
  const search = document.getElementById('ff-search').value.trim().toLowerCase();

  return entries.filter(e=>{
    if(type && (e.type||'expense') !== type) return false;
    if(start && e.date < start) return false;
    if(end && e.date > end) return false;
    if(cat && e.category !== cat) return false;
    if(pay && e.payment !== pay) return false;
    if(search && !((e.item||'').toLowerCase().includes(search) || (e.place||'').toLowerCase().includes(search))) return false;
    return true;
  }).sort((a,b)=> b.date.localeCompare(a.date));
}

function renderTable(filtered){
  const body = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  document.getElementById('rowCount').textContent = `(${filtered.length}건)`;
  if(filtered.length===0){
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  body.innerHTML = filtered.map(e=>{
    const type = e.type || 'expense';
    return `
    <tr>
      <td data-label="날짜">${e.date}</td>
      <td data-label="구분"><span class="type-pill ${type}">${type==='income'?'수입':'지출'}</span></td>
      <td data-label="구매내역">${escapeHtml(e.item)}</td>
      <td data-label="카테고리"><span class="cat-pill" style="background:${CATEGORY_COLORS[e.category]||'#7A7A7A'}">${e.category}</span></td>
      <td data-label="금액" class="amount ${type}">${type==='income'?'+':''}${fmt(e.amount)}</td>
      <td data-label="구매장소">${escapeHtml(e.place||'')}</td>
      <td data-label="결제방법">${escapeHtml(e.payment||'')}</td>
      <td data-label="" class="row-actions">
        <button class="btn-ghost" onclick="editEntry('${e.id}')">수정</button>
        <button class="btn-ghost" onclick="deleteEntry('${e.id}')">삭제</button>
      </td>
    </tr>
  `;}).join('');
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

window.editEntry = function(id){
  const e = entries.find(x=>x.id===id);
  if(!e) return;
  const type = e.type || 'expense';
  document.getElementById('f-type').value = type;
  populateCategorySelect(type);
  document.getElementById('f-date').value = e.date;
  document.getElementById('f-item').value = e.item;
  document.getElementById('f-amount').value = e.amount;
  document.getElementById('f-place').value = e.place;
  document.getElementById('f-payment').value = e.payment;
  document.getElementById('f-category').value = e.category;
  editingId = id;
  document.getElementById('submitBtn').textContent = '수정 완료';
  document.querySelector('.tab-btn[data-tab="input"]').click();
  window.scrollTo({top:0, behavior:'smooth'});
};
window.deleteEntry = async function(id){
  if(!confirm('이 내역을 삭제할까요?')) return;
  entries = entries.filter(e=>e.id!==id);
  await saveEntries();
  populateFilterOptions();
  render();
};

function renderStats(filtered){
  const incomeEntries = filtered.filter(e=>(e.type||'expense')==='income');
  const expenseEntries = filtered.filter(e=>(e.type||'expense')==='expense');
  const incomeSum = incomeEntries.reduce((a,e)=>a+e.amount,0);
  const expenseSum = expenseEntries.reduce((a,e)=>a+e.amount,0);
  const net = incomeSum - expenseSum;
  const count = filtered.length;

  document.getElementById('filteredTotal').textContent = (net<0?'-':'') + fmt(Math.abs(net));
  document.getElementById('filteredTotal').style.color = net < 0 ? 'var(--danger)' : 'var(--accent)';
  document.getElementById('statCount').textContent = count + '건';
  document.getElementById('statIncome').textContent = fmt(incomeSum);
  document.getElementById('statExpense').textContent = fmt(expenseSum);
  document.getElementById('statNet').textContent = (net<0?'-':'') + fmt(Math.abs(net));
  document.getElementById('statNet').style.color = net < 0 ? 'var(--danger)' : 'var(--accent)';

  // 월별 집계 (수입/지출 분리)
  const monthIncome = {}, monthExpense = {};
  filtered.forEach(e=>{
    const m = e.date ? e.date.slice(0,7) : '미상';
    if((e.type||'expense')==='income'){ monthIncome[m] = (monthIncome[m]||0) + e.amount; }
    else{ monthExpense[m] = (monthExpense[m]||0) + e.amount; }
  });
  const months = [...new Set([...Object.keys(monthIncome), ...Object.keys(monthExpense)])].sort();
  const incomeVals = months.map(m=>monthIncome[m]||0);
  const expenseVals = months.map(m=>monthExpense[m]||0);

  if(monthlyChartInst) monthlyChartInst.destroy();
  monthlyChartInst = new Chart(document.getElementById('monthlyChart'), {
    type:'bar',
    data:{
      labels: months,
      datasets:[
        { label:'수입', data: incomeVals, backgroundColor:'#3D8B7D', borderRadius:3, maxBarThickness:28 },
        { label:'지출', data: expenseVals, backgroundColor:'#A65B4E', borderRadius:3, maxBarThickness:28 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:true, position:'top', labels:{boxWidth:10, font:{size:11}}}, tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` } } },
      scales:{
        y:{ ticks:{ callback:v=>Number(v).toLocaleString('ko-KR') }, grid:{ color:'#E2DFD6' } },
        x:{ grid:{ display:false } }
      }
    }
  });

  // 카테고리별 집계 (지출만)
  const catMap = {};
  expenseEntries.forEach(e=>{ catMap[e.category] = (catMap[e.category]||0) + e.amount; });
  const cats = Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]);
  const catVals = cats.map(c=>catMap[c]);
  const catColors = cats.map(c=>CATEGORY_COLORS[c]||'#7A7A7A');
  const catTotal = catVals.reduce((a,v)=>a+v, 0);
  const catLabels = cats.map((c,i)=> catTotal ? `${c} (${(catVals[i]/catTotal*100).toFixed(1)}%)` : c);

  if(categoryChartInst) categoryChartInst.destroy();
  const legendPos = window.innerWidth < 600 ? 'bottom' : 'right';
  categoryChartInst = new Chart(document.getElementById('categoryChart'), {
    type:'doughnut',
    data:{ labels: catLabels, datasets:[{ data: catVals, backgroundColor: catColors, borderWidth:2, borderColor:'#FFFFFF' }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position: legendPos, labels:{ boxWidth:10, font:{size:11} } },
        tooltip:{ callbacks:{ label: ctx => {
          const pct = catTotal ? (ctx.parsed/catTotal*100).toFixed(1) : 0;
          return `${cats[ctx.dataIndex]}: ${fmt(ctx.parsed)} (${pct}%)`;
        } } }
      }
    }
  });
}

function render(){
  const filtered = getFiltered();
  renderTable(filtered);
  renderStats(filtered);
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = `가계부_백업_${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportCSV(){
  const header = ['날짜','구분','구매내역','카테고리','금액','구매장소','결제방법'];
  const rows = entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(e=>[
    e.date, (e.type||'expense')==='income'?'수입':'지출', e.item, e.category, e.amount, e.place||'', e.payment||''
  ]);
  const csvBody = [header, ...rows].map(r=>
    r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')
  ).join('\n');
  const csv = '\uFEFF' + csvBody; // BOM for Excel 한글 깨짐 방지
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = `가계부_${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    let imported;
    try{
      imported = JSON.parse(e.target.result);
      if(!Array.isArray(imported)) throw new Error('형식 오류');
    }catch(err){
      alert('올바른 백업 파일이 아닙니다.');
      return;
    }
    const replace = confirm(`백업 파일에 ${imported.length}건이 있습니다.\n\n확인 = 기존 내역에 추가 (중복 방지)\n취소 = 기존 내역 전체 교체`);
    if(replace){
      const existingIds = new Set(entries.map(x=>x.id));
      const toAdd = imported.filter(x=>x && x.id && !existingIds.has(x.id));
      entries = entries.concat(toAdd);
    }else{
      entries = imported;
    }
    saveEntries();
    populateFilterOptions();
    render();
    alert('불러오기가 완료되었습니다.');
  };
  reader.readAsText(file);
}

document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) importJSON(file);
  e.target.value = '';
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab === 'stats'){
      renderStats(getFiltered());
    }
  });
});

(async function init(){
  await loadEntries();
  populateCategorySelect('expense');
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  populateFilterOptions();
  render();
})();
</script>
</body>
